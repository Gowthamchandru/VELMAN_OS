name: Deploy Velman OS to GitHub Pages

# Rebuilds and redeploys automatically on every push to master.
on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      # Use vite build directly so a stray type error in a WIP file never
      # blocks the deploy. (Run `npm run build` locally for full type-checking.)
      - name: Build
        run: npx vite build

      # GitHub Pages has no server, so copy index.html to 404.html — this makes
      # deep links / refreshes on client-side routes load the SPA correctly.
      - name: SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
